<div [class]="isDialogMode ? 'p-1' : 'min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100'">
    <div [class]="isDialogMode ? 'bg-white rounded-lg p-4 w-full' : 'bg-white rounded-lg shadow-xl p-8 w-full max-w-md'">
        <!-- Заголовок -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Taxi Platform</h1>
            <p class="text-gray-600">Вхід у акаунт</p>
        </div>

        <!-- Помилка -->
        <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-700 text-sm">{{ errorMessage }}</p>
        </div>

        <!-- Форма входу -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                    Email
                </label>
                <input id="email" type="email" formControlName="email" placeholder="example@email.com"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    [class.border-red-500]="submitted && f['email'].errors" />
                <div *ngIf="submitted && f['email'].errors" class="mt-2 text-sm text-red-600">
                    <span *ngIf="f['email'].errors['required']">Email обов'язковий</span>
                    <span *ngIf="f['email'].errors['email']">Введіть коректний email</span>
                </div>
            </div>

            <!-- Пароль -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Пароль
                </label>
                <input id="password" type="password" formControlName="password" placeholder="••••••••"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    [class.border-red-500]="submitted && f['password'].errors" />
                <div *ngIf="submitted && f['password'].errors" class="mt-2 text-sm text-red-600">
                    <span *ngIf="f['password'].errors['required']">Пароль обов'язковий</span>
                    <span *ngIf="f['password'].errors['minlength']">Пароль повинен містити мінімум 6 символів</span>
                </div>
            </div>

            <!-- Забув пароль -->
            <div class="text-right">
                <a (click)="openForgotPassword()" class="text-sm text-blue-600 hover:text-blue-700 font-medium cursor-pointer">
                    Забув пароль?
                </a>
            </div>

            <!-- Кнопка входу -->
            <button type="submit" [disabled]="loading"
                class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                <span *ngIf="!loading">Увійти</span>
                <span *ngIf="loading">Завантаження...</span>
            </button>
        </form>

        <!-- Соціальна авторизація -->
        <div class="mt-6" *ngIf="!isDialogMode">
            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Або</span>
                </div>
            </div>

            <div class="space-y-3">
                <!-- Google login -->
                <button type="button" (click)="loginWithGoogle()"
                    class="w-full py-2 px-4 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-200 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                        <path d="M1 1h22v22H1z" fill="none" />
                    </svg>
                    <span class="font-medium text-gray-700">Google</span>
                </button>

                <!-- Facebook login -->
                <button type="button" (click)="loginWithFacebook()"
                    class="w-full py-2 px-4 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-200 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 text-blue-600" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg> <span class="font-medium text-gray-700">Facebook</span> </button>
            </div>
        </div> <!-- Реєстрація -->
        <div class="mt-6 text-center">
            <p class="text-gray-600">Немаєте акаунту? <a (click)="openRegister()"
                    class="text-blue-600 hover:text-blue-700 font-medium cursor-pointer"> Зареєструйтеся </a> </p>
        </div>
    </div>
</div>
