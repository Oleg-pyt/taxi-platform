services:
  postgres:
    image: postgres:16
    container_name: taxi-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: api
    command: ["echo", "api built"]
    volumes:
      - m2-repo:/root/.m2

  backend:
    build:
      context: ./backend
      additional_contexts:
        api: "service:api"
    container_name: taxi-backend
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - m2-repo:/root/.m2
    depends_on:
      api:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      additional_contexts:
        api: "service:api"
    container_name: taxi-frontend
    ports:
      - "3000:80"
    volumes:
      - m2-repo:/root/.m2
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres-data:
  m2-repo: